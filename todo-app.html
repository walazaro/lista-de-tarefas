<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TaskFlow — Gerenciador de Tarefas</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0f14;
      --surface: #13161e;
      --surface2: #1a1e2a;
      --border: #252a38;
      --accent: #6ee7b7;
      --accent2: #38bdf8;
      --accent3: #f472b6;
      --warn: #fb923c;
      --text: #e8eaf0;
      --muted: #6b7280;
      --radius: 16px;
      --font-head: 'Syne', sans-serif;
      --font-body: 'DM Sans', sans-serif;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Background blobs */
    body::before {
      content: '';
      position: fixed;
      top: -200px; left: -200px;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(110,231,183,0.07) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }
    body::after {
      content: '';
      position: fixed;
      bottom: -200px; right: -200px;
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(244,114,182,0.06) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .app {
      position: relative;
      z-index: 1;
      max-width: 760px;
      margin: 0 auto;
      padding: 48px 24px 80px;
    }

    /* ── Header ── */
    header {
      margin-bottom: 48px;
      animation: fadeDown 0.6s ease both;
    }
    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }
    .logo {
      font-family: var(--font-head);
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .date-badge {
      font-size: 13px;
      color: var(--muted);
      background: var(--surface2);
      border: 1px solid var(--border);
      padding: 6px 14px;
      border-radius: 99px;
      font-weight: 500;
    }

    /* Stats */
    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      text-align: center;
      transition: border-color 0.2s;
    }
    .stat-card:hover { border-color: var(--accent); }
    .stat-number {
      font-family: var(--font-head);
      font-size: 32px;
      font-weight: 800;
      line-height: 1;
      margin-bottom: 4px;
    }
    .stat-number.green { color: var(--accent); }
    .stat-number.blue  { color: var(--accent2); }
    .stat-number.pink  { color: var(--accent3); }
    .stat-label { font-size: 12px; color: var(--muted); font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }

    /* Progress bar */
    .progress-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 24px;
      margin-top: 12px;
    }
    .progress-info {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 10px;
    }
    .progress-bar-bg {
      background: var(--surface2);
      border-radius: 99px;
      height: 8px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      border-radius: 99px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      transition: width 0.5s cubic-bezier(.4,0,.2,1);
    }

    /* ── Input Area ── */
    .input-section {
      margin-bottom: 32px;
      animation: fadeDown 0.6s 0.1s ease both;
    }
    .input-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
    }
    .input-row {
      display: flex;
      gap: 10px;
      margin-bottom: 12px;
    }
    .task-input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 16px;
      color: var(--text);
      font-family: var(--font-body);
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .task-input::placeholder { color: var(--muted); }
    .task-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(110,231,183,0.1);
    }
    .add-btn {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 10px;
      padding: 12px 22px;
      color: #0d0f14;
      font-family: var(--font-head);
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
      white-space: nowrap;
    }
    .add-btn:hover { opacity: 0.9; transform: translateY(-1px); }
    .add-btn:active { transform: translateY(0); }

    .meta-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .meta-select, .meta-date {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px;
      color: var(--text);
      font-family: var(--font-body);
      font-size: 13px;
      outline: none;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .meta-select:focus, .meta-date:focus { border-color: var(--accent); }
    .meta-select option { background: var(--surface2); }

    /* ── Filters ── */
    .filters {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 20px;
      animation: fadeDown 0.6s 0.15s ease both;
    }
    .filter-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 99px;
      padding: 7px 16px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      font-family: var(--font-body);
    }
    .filter-btn:hover { border-color: var(--accent); color: var(--text); }
    .filter-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #0d0f14;
      font-weight: 700;
    }

    /* Search */
    .search-wrap {
      position: relative;
      margin-bottom: 20px;
      animation: fadeDown 0.6s 0.2s ease both;
    }
    .search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 16px;
      pointer-events: none;
    }
    .search-input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 11px 16px 11px 42px;
      color: var(--text);
      font-family: var(--font-body);
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    .search-input::placeholder { color: var(--muted); }
    .search-input:focus { border-color: var(--accent2); }

    /* ── Task List ── */
    .section-title {
      font-family: var(--font-head);
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
      margin-bottom: 12px;
    }

    #task-list { list-style: none; }

    .task-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 18px;
      margin-bottom: 10px;
      display: flex;
      align-items: flex-start;
      gap: 14px;
      transition: border-color 0.2s, transform 0.2s, opacity 0.3s;
      animation: slideIn 0.35s ease both;
      position: relative;
      overflow: hidden;
    }
    .task-item::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      border-radius: 3px 0 0 3px;
    }
    .task-item.priority-alta::before   { background: var(--accent3); }
    .task-item.priority-media::before  { background: var(--warn); }
    .task-item.priority-baixa::before  { background: var(--accent); }
    .task-item:hover { border-color: #333a4d; transform: translateX(2px); }
    .task-item.done  { opacity: 0.5; }

    /* Checkbox */
    .task-check {
      width: 22px; height: 22px;
      border-radius: 6px;
      border: 2px solid var(--border);
      background: var(--surface2);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
      margin-top: 1px;
    }
    .task-check:hover { border-color: var(--accent); }
    .task-check.checked {
      background: var(--accent);
      border-color: var(--accent);
    }
    .task-check.checked::after {
      content: '✓';
      color: #0d0f14;
      font-size: 13px;
      font-weight: 900;
    }

    /* Task content */
    .task-content { flex: 1; min-width: 0; }
    .task-text {
      font-size: 15px;
      font-weight: 400;
      line-height: 1.4;
      margin-bottom: 6px;
      word-break: break-word;
      transition: all 0.2s;
    }
    .task-item.done .task-text {
      text-decoration: line-through;
      color: var(--muted);
    }
    .task-meta {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }
    .tag {
      font-size: 11px;
      font-weight: 600;
      padding: 3px 9px;
      border-radius: 99px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }
    .tag.cat-trabalho  { background: rgba(56,189,248,0.15); color: var(--accent2); }
    .tag.cat-pessoal   { background: rgba(110,231,183,0.15); color: var(--accent); }
    .tag.cat-estudos   { background: rgba(244,114,182,0.15); color: var(--accent3); }
    .tag.cat-saude     { background: rgba(251,146,60,0.15);  color: var(--warn); }
    .tag.cat-outros    { background: rgba(107,114,128,0.15); color: var(--muted); }
    .tag.pri-alta  { background: rgba(244,114,182,0.1); color: var(--accent3); }
    .tag.pri-media { background: rgba(251,146,60,0.1);  color: var(--warn); }
    .tag.pri-baixa { background: rgba(110,231,183,0.1); color: var(--accent); }
    .task-due {
      font-size: 11px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 3px;
    }
    .task-due.overdue { color: var(--accent3); }

    /* Actions */
    .task-actions {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }
    .act-btn {
      width: 30px; height: 30px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--muted);
      cursor: pointer;
      font-size: 14px;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
    }
    .act-btn:hover.edit  { border-color: var(--accent2); color: var(--accent2); }
    .act-btn:hover.del   { border-color: var(--accent3); color: var(--accent3); }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 60px 0;
      color: var(--muted);
      display: none;
    }
    .empty-state.visible { display: block; }
    .empty-icon { font-size: 48px; margin-bottom: 12px; opacity: 0.4; }
    .empty-text { font-size: 15px; }

    /* Edit modal */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(4px);
      z-index: 100;
      display: none;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 28px;
      width: 100%;
      max-width: 460px;
      margin: 16px;
      animation: popIn 0.25s ease;
    }
    .modal-title {
      font-family: var(--font-head);
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 20px;
    }
    .modal-input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 16px;
      color: var(--text);
      font-family: var(--font-body);
      font-size: 15px;
      outline: none;
      margin-bottom: 12px;
      transition: border-color 0.2s;
    }
    .modal-input:focus { border-color: var(--accent); }
    .modal-row { display: flex; gap: 10px; margin-bottom: 12px; }
    .modal-row .meta-select, .modal-row .meta-date { flex: 1; }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 4px; }
    .modal-cancel {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 20px;
      color: var(--muted);
      font-family: var(--font-body);
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .modal-cancel:hover { color: var(--text); }
    .modal-save {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 10px;
      padding: 10px 24px;
      color: #0d0f14;
      font-family: var(--font-head);
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .modal-save:hover { opacity: 0.9; }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 99px;
      padding: 11px 24px;
      font-size: 14px;
      color: var(--text);
      z-index: 200;
      transition: transform 0.35s cubic-bezier(.4,0,.2,1), opacity 0.35s;
      opacity: 0;
      pointer-events: none;
      white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

    /* Animations */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-12px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    @keyframes popIn {
      from { opacity: 0; transform: scale(0.92); }
      to   { opacity: 1; transform: scale(1); }
    }

    /* Responsive */
    @media (max-width: 520px) {
      .stats { grid-template-columns: repeat(3, 1fr); }
      .stat-number { font-size: 24px; }
      .input-row { flex-direction: column; }
      .add-btn { width: 100%; }
    }
  </style>
</head>
<body>

<div class="app">

  <!-- Header -->
  <header>
    <div class="header-top">
      <div class="logo">TaskFlow</div>
      <div class="date-badge" id="date-badge"></div>
    </div>

    <div class="stats">
      <div class="stat-card">
        <div class="stat-number green" id="stat-total">0</div>
        <div class="stat-label">Total</div>
      </div>
      <div class="stat-card">
        <div class="stat-number blue" id="stat-done">0</div>
        <div class="stat-label">Concluídas</div>
      </div>
      <div class="stat-card">
        <div class="stat-number pink" id="stat-pending">0</div>
        <div class="stat-label">Pendentes</div>
      </div>
    </div>

    <div class="progress-wrap" style="margin-top:12px">
      <div class="progress-info">
        <span>Progresso geral</span>
        <span id="progress-pct">0%</span>
      </div>
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
      </div>
    </div>
  </header>

  <!-- Input -->
  <div class="input-section">
    <div class="input-card">
      <div class="input-row">
        <input class="task-input" id="task-input" type="text" placeholder="Nova tarefa… o que precisa ser feito?" maxlength="120"/>
        <button class="add-btn" onclick="addTask()">+ Adicionar</button>
      </div>
      <div class="meta-row">
        <select class="meta-select" id="cat-select">
          <option value="trabalho">💼 Trabalho</option>
          <option value="pessoal">🙂 Pessoal</option>
          <option value="estudos">📚 Estudos</option>
          <option value="saude">❤️ Saúde</option>
          <option value="outros">🔖 Outros</option>
        </select>
        <select class="meta-select" id="pri-select">
          <option value="media">⚡ Média</option>
          <option value="alta">🔴 Alta</option>
          <option value="baixa">🟢 Baixa</option>
        </select>
        <input class="meta-date" id="due-input" type="date"/>
      </div>
    </div>
  </div>

  <!-- Filters -->
  <div class="filters">
    <button class="filter-btn active" onclick="setFilter('todas', this)">Todas</button>
    <button class="filter-btn" onclick="setFilter('pendentes', this)">Pendentes</button>
    <button class="filter-btn" onclick="setFilter('concluidas', this)">Concluídas</button>
    <button class="filter-btn" onclick="setFilter('alta', this)">🔴 Alta</button>
    <button class="filter-btn" onclick="setFilter('media', this)">⚡ Média</button>
    <button class="filter-btn" onclick="setFilter('baixa', this)">🟢 Baixa</button>
  </div>

  <!-- Search -->
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input class="search-input" id="search-input" type="text" placeholder="Buscar tarefas…" oninput="render()"/>
  </div>

  <div class="section-title">Suas tarefas</div>
  <ul id="task-list"></ul>
  <div class="empty-state" id="empty-state">
    <div class="empty-icon">📋</div>
    <div class="empty-text">Nenhuma tarefa encontrada.</div>
  </div>
</div>

<!-- Edit Modal -->
<div class="modal-overlay" id="modal" onclick="closeModalBg(event)">
  <div class="modal">
    <div class="modal-title">Editar tarefa</div>
    <input class="modal-input" id="modal-text" type="text" placeholder="Descrição da tarefa" maxlength="120"/>
    <div class="modal-row">
      <select class="meta-select" id="modal-cat">
        <option value="trabalho">💼 Trabalho</option>
        <option value="pessoal">🙂 Pessoal</option>
        <option value="estudos">📚 Estudos</option>
        <option value="saude">❤️ Saúde</option>
        <option value="outros">🔖 Outros</option>
      </select>
      <select class="meta-select" id="modal-pri">
        <option value="media">⚡ Média</option>
        <option value="alta">🔴 Alta</option>
        <option value="baixa">🟢 Baixa</option>
      </select>
    </div>
    <input class="modal-input meta-date" id="modal-due" type="date"/>
    <div class="modal-actions">
      <button class="modal-cancel" onclick="closeModal()">Cancelar</button>
      <button class="modal-save" onclick="saveEdit()">Salvar</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
  let tasks = JSON.parse(localStorage.getItem('taskflow_tasks') || '[]');
  let currentFilter = 'todas';
  let editingId = null;

  // Set today's date as default
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('due-input').value = today;

  // Date badge
  const opts = { weekday:'long', year:'numeric', month:'long', day:'numeric' };
  document.getElementById('date-badge').textContent =
    new Date().toLocaleDateString('pt-BR', opts);

  function save() {
    localStorage.setItem('taskflow_tasks', JSON.stringify(tasks));
  }

  function uid() {
    return Date.now().toString(36) + Math.random().toString(36).slice(2);
  }

  function addTask() {
    const text = document.getElementById('task-input').value.trim();
    if (!text) { showToast('⚠️ Digite uma tarefa!'); return; }
    const task = {
      id: uid(),
      text,
      cat: document.getElementById('cat-select').value,
      pri: document.getElementById('pri-select').value,
      due: document.getElementById('due-input').value,
      done: false,
      createdAt: Date.now()
    };
    tasks.unshift(task);
    save(); render();
    document.getElementById('task-input').value = '';
    showToast('✅ Tarefa adicionada!');
  }

  document.getElementById('task-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') addTask();
  });

  function toggleDone(id) {
    const t = tasks.find(t => t.id === id);
    if (t) { t.done = !t.done; save(); render(); }
  }

  function deleteTask(id) {
    tasks = tasks.filter(t => t.id !== id);
    save(); render();
    showToast('🗑️ Tarefa removida.');
  }

  function openEdit(id) {
    const t = tasks.find(t => t.id === id);
    if (!t) return;
    editingId = id;
    document.getElementById('modal-text').value = t.text;
    document.getElementById('modal-cat').value = t.cat;
    document.getElementById('modal-pri').value = t.pri;
    document.getElementById('modal-due').value = t.due || '';
    document.getElementById('modal').classList.add('open');
  }

  function closeModal() {
    document.getElementById('modal').classList.remove('open');
    editingId = null;
  }

  function closeModalBg(e) {
    if (e.target === document.getElementById('modal')) closeModal();
  }

  function saveEdit() {
    const t = tasks.find(t => t.id === editingId);
    if (!t) return;
    const newText = document.getElementById('modal-text').value.trim();
    if (!newText) { showToast('⚠️ Texto não pode estar vazio.'); return; }
    t.text = newText;
    t.cat = document.getElementById('modal-cat').value;
    t.pri = document.getElementById('modal-pri').value;
    t.due = document.getElementById('modal-due').value;
    save(); render(); closeModal();
    showToast('✏️ Tarefa atualizada!');
  }

  function setFilter(f, btn) {
    currentFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  }

  function getFiltered() {
    const q = document.getElementById('search-input').value.toLowerCase();
    return tasks.filter(t => {
      const matchSearch = t.text.toLowerCase().includes(q);
      let matchFilter = true;
      if (currentFilter === 'pendentes')   matchFilter = !t.done;
      if (currentFilter === 'concluidas')  matchFilter = t.done;
      if (currentFilter === 'alta')        matchFilter = t.pri === 'alta';
      if (currentFilter === 'media')       matchFilter = t.pri === 'media';
      if (currentFilter === 'baixa')       matchFilter = t.pri === 'baixa';
      return matchSearch && matchFilter;
    });
  }

  function isOverdue(due) {
    if (!due) return false;
    return due < today && true;
  }

  function fmtDate(d) {
    if (!d) return '';
    const [y,m,day] = d.split('-');
    return `${day}/${m}/${y}`;
  }

  function catLabel(c) {
    const map = { trabalho:'💼 Trabalho', pessoal:'🙂 Pessoal', estudos:'📚 Estudos', saude:'❤️ Saúde', outros:'🔖 Outros' };
    return map[c] || c;
  }

  function priLabel(p) {
    const map = { alta:'🔴 Alta', media:'⚡ Média', baixa:'🟢 Baixa' };
    return map[p] || p;
  }

  function render() {
    const list = document.getElementById('task-list');
    const empty = document.getElementById('empty-state');
    const filtered = getFiltered();

    // Stats
    const total   = tasks.length;
    const done    = tasks.filter(t => t.done).length;
    const pending = total - done;
    const pct     = total ? Math.round(done / total * 100) : 0;
    document.getElementById('stat-total').textContent   = total;
    document.getElementById('stat-done').textContent    = done;
    document.getElementById('stat-pending').textContent = pending;
    document.getElementById('progress-pct').textContent = pct + '%';
    document.getElementById('progress-fill').style.width = pct + '%';

    list.innerHTML = '';

    if (filtered.length === 0) {
      empty.classList.add('visible');
    } else {
      empty.classList.remove('visible');
      filtered.forEach(t => {
        const li = document.createElement('li');
        li.className = `task-item priority-${t.pri}${t.done ? ' done' : ''}`;
        const overdue = !t.done && isOverdue(t.due);
        li.innerHTML = `
          <div class="task-check ${t.done ? 'checked' : ''}" onclick="toggleDone('${t.id}')"></div>
          <div class="task-content">
            <div class="task-text">${escHtml(t.text)}</div>
            <div class="task-meta">
              <span class="tag cat-${t.cat}">${catLabel(t.cat)}</span>
              <span class="tag pri-${t.pri}">${priLabel(t.pri)}</span>
              ${t.due ? `<span class="task-due ${overdue ? 'overdue' : ''}">📅 ${fmtDate(t.due)}${overdue ? ' • atrasada' : ''}</span>` : ''}
            </div>
          </div>
          <div class="task-actions">
            <button class="act-btn edit" onclick="openEdit('${t.id}')" title="Editar">✏️</button>
            <button class="act-btn del"  onclick="deleteTask('${t.id}')" title="Excluir">🗑️</button>
          </div>
        `;
        list.appendChild(li);
      });
    }
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  let toastTimer;
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 2400);
  }

  // Seed with sample tasks
  if (tasks.length === 0) {
    tasks = [
      { id: uid(), text: 'Revisar código do projeto final', cat: 'estudos',  pri: 'alta',  due: today, done: false, createdAt: Date.now()-5000 },
      { id: uid(), text: 'Preparar slides para apresentação', cat: 'trabalho', pri: 'alta',  due: today, done: false, createdAt: Date.now()-4000 },
      { id: uid(), text: 'Ler capítulo 3 do livro de algoritmos', cat: 'estudos',  pri: 'media', due: '', done: true, createdAt: Date.now()-3000 },
      { id: uid(), text: 'Fazer exercícios físicos', cat: 'saude',    pri: 'baixa', due: '', done: false, createdAt: Date.now()-2000 },
      { id: uid(), text: 'Responder e-mails pendentes', cat: 'trabalho', pri: 'media', due: '', done: true, createdAt: Date.now()-1000 },
    ];
    save();
  }

  render();
</script>
</body>
</html>
